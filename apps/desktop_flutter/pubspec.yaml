name: rhythm_desktop
version: 0.1.0
publish_to: "none"
description: Desktop-first planning hub client for Rhythm.

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_sign_in: ^7.2.0
  flutter_local_notifications: ^17.2.1+2
  http: ^1.2.0
  package_info_plus: ^8.0.2
  provider: ^6.1.2
  url_launcher: ^6.3.1
  window_manager: ^0.3.8
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/rhythm_logo.png
