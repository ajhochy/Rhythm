services:
  rhythm-api:
    image: ${RHYTHM_API_IMAGE:-ghcr.io/ajhochy/rhythm-api:main}
    container_name: rhythm-api
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env.production
    volumes:
      - rhythm_api_data:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: rhythm-cloudflared
    restart: unless-stopped
    depends_on:
      - rhythm-api
    env_file:
      - .env.production
    command: tunnel run

volumes:
  rhythm_api_data:
