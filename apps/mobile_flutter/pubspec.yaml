name: rhythm_mobile
version: 0.1.0
publish_to: "none"
description: Mobile companion app for Rhythm — church staff productivity.

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.0
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^17.2.1+2
  flutter_appauth: ^6.0.0
  package_info_plus: ^8.0.2
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: fonts/inter/Inter-Thin.otf
          weight: 100
        - asset: fonts/inter/Inter-ThinItalic.otf
          weight: 100
          style: italic
        - asset: fonts/inter/Inter-ExtraLight.otf
          weight: 200
        - asset: fonts/inter/Inter-ExtraLightItalic.otf
          weight: 200
          style: italic
        - asset: fonts/inter/Inter-Light.otf
          weight: 300
        - asset: fonts/inter/Inter-LightItalic.otf
          weight: 300
          style: italic
        - asset: fonts/inter/Inter-Regular.otf
          weight: 400
        - asset: fonts/inter/Inter-Italic.otf
          weight: 400
          style: italic
        - asset: fonts/inter/Inter-Medium.otf
          weight: 500
        - asset: fonts/inter/Inter-MediumItalic.otf
          weight: 500
          style: italic
        - asset: fonts/inter/Inter-SemiBold.otf
          weight: 600
        - asset: fonts/inter/Inter-SemiBoldItalic.otf
          weight: 600
          style: italic
        - asset: fonts/inter/Inter-Bold.otf
          weight: 700
        - asset: fonts/inter/Inter-BoldItalic.otf
          weight: 700
          style: italic
        - asset: fonts/inter/Inter-ExtraBold.otf
          weight: 800
        - asset: fonts/inter/Inter-ExtraBoldItalic.otf
          weight: 800
          style: italic
        - asset: fonts/inter/Inter-Black.otf
          weight: 900
        - asset: fonts/inter/Inter-BlackItalic.otf
          weight: 900
          style: italic
