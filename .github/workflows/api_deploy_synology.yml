name: API Deploy (Synology)

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api_server/**'
      - '.github/workflows/api_deploy_synology.yml'
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: apps/api_server
    env:
      RHYTHM_API_IMAGE: ghcr.io/${{ github.repository_owner }}/rhythm-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api_server/package-lock.json

      - name: Verify API server
        run: |
          npm install --workspaces=false
          npm test
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RHYTHM_API_IMAGE }}
          tags: |
            type=raw,value=main
            type=sha,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: apps/api_server
          file: apps/api_server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Manual server update required
        run: |
          echo "============================================================"
          echo "  Image pushed to GHCR. Server update is MANUAL."
          echo ""
          echo "  SSH into the Synology and run:"
          echo ""
          echo "    docker pull ghcr.io/${{ github.repository_owner }}/rhythm-api:main"
          echo "    docker compose -f /path/to/docker-compose.yml up -d --no-deps rhythm-api"
          echo ""
          echo "  Or, if running the container directly:"
          echo ""
          echo "    docker pull ghcr.io/${{ github.repository_owner }}/rhythm-api:main"
          echo "    docker stop rhythm-api && docker rm rhythm-api"
          echo "    docker run -d --name rhythm-api --restart unless-stopped \\"
          echo "      -p 4000:4000 \\"
          echo "      --env-file /path/to/.env \\"
          echo "      ghcr.io/${{ github.repository_owner }}/rhythm-api:main"
          echo "============================================================"
