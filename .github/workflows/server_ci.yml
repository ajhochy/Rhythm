name: Server CI

on:
  pull_request:
    paths:
      - 'apps/api_server/**'
      - '.github/workflows/server_ci.yml'

jobs:
  server-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api_server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/api_server/package.json
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
