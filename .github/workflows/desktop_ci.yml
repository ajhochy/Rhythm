name: Desktop CI

on:
  pull_request:
    paths:
      - 'apps/desktop_flutter/**'
      - '.github/workflows/desktop_ci.yml'

jobs:
  desktop-checks:
    runs-on: macos-latest
    env:
      GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
    defaults:
      run:
        working-directory: apps/desktop_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze --no-fatal-infos
      - run: flutter test
      - name: Build macOS debug app
        run: >
          flutter build macos --debug
          --dart-define=GOOGLE_DESKTOP_CLIENT_ID="$GOOGLE_DESKTOP_CLIENT_ID"
