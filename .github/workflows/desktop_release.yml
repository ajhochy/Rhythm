name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the v prefix'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as a prerelease'
        required: true
        default: true
        type: boolean
      release_notes:
        description: 'Optional release notes override'
        required: false
        type: string

jobs:
  build-macos-release:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      RELEASE_VERSION: ${{ inputs.version }}
      RELEASE_TAG: v${{ inputs.version }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_AUTH_CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_DESKTOP_CLIENT_ID: ${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
      GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
      PCO_APPLICATION_ID: ${{ secrets.PCO_APPLICATION_ID }}
      PCO_SECRET: ${{ secrets.PCO_SECRET }}
      PCO_REDIRECT_URI: ${{ secrets.PCO_REDIRECT_URI }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter dependencies
        working-directory: apps/desktop_flutter
        run: flutter pub get

      - name: Verify desktop app
        working-directory: apps/desktop_flutter
        run: |
          dart format --output=none --set-exit-if-changed .
          flutter analyze --no-fatal-infos
          flutter test

      - name: Build API server
        working-directory: apps/api_server
        run: |
          npm install
          npm run build
          npm prune --omit=dev

      - name: Build macOS release
        working-directory: apps/desktop_flutter
        run: >
          flutter build macos --release
          --build-name="$RELEASE_VERSION"
          --build-number="${{ github.run_number }}"
          --dart-define=GOOGLE_DESKTOP_CLIENT_ID="$GOOGLE_DESKTOP_CLIENT_ID"

      - name: Bundle API server into app
        working-directory: apps/desktop_flutter
        run: |
          APP="build/macos/Build/Products/Release/Rhythm.app"
          DEST="$APP/Contents/Resources/api_server"
          mkdir -p "$DEST"
          cp -r ../api_server/dist "$DEST/"
          cp ../api_server/package.json "$DEST/"
          cp ../api_server/package-lock.json "$DEST/"
          (
            cd "$DEST"
            npm install --omit=dev
          )
          # Write OAuth secrets into a .env file loaded by the server at runtime
          printf 'GOOGLE_CLIENT_ID=%s\nGOOGLE_AUTH_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nGOOGLE_REDIRECT_URI=%s\nPCO_APPLICATION_ID=%s\nPCO_SECRET=%s\nPCO_REDIRECT_URI=%s\n' \
            "$GOOGLE_CLIENT_ID" "$GOOGLE_AUTH_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" "$GOOGLE_REDIRECT_URI" \
            "$PCO_APPLICATION_ID" "$PCO_SECRET" "$PCO_REDIRECT_URI" \
            > "$DEST/.env"

      - name: Package macOS artifacts
        working-directory: apps/desktop_flutter
        run: ../../tools/release/package_macos.sh

      - name: Sign and notarize when Apple secrets are present
        working-directory: apps/desktop_flutter
        run: ../../tools/release/sign_and_notarize_macos.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhythm-macos-${{ inputs.version }}
          path: dist/*

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Rhythm ${{ env.RELEASE_TAG }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.release_notes == '' }}
          body: ${{ inputs.release_notes }}
          files: |
            apps/desktop_flutter/dist/*.zip
            apps/desktop_flutter/dist/*.dmg
